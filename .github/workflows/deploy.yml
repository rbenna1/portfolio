name: Build and Deploy

concurrency:
  group: terraform-apply-${{ github.ref_name }}
  cancel-in-progress: true

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      force_invalidation:
        description: 'Type "1" to force client rebuild/deploy and CloudFront invalidation even if no client changes detected'
        required: false
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "latest"
          cache: "pnpm"
          cache-dependency-path: "./client/pnpm-lock.yaml"

      - name: Install Dependencies
        working-directory: ./client
        run: pnpm install --frozen-lockfile

      - name: Build Client
        working-directory: ./client
        run: |
          pnpm build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_IAM_ROLE_NAME }}
          role-session-name: github-actions-role
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Create Terraform State Infrastructure
        run: bash terraform/bootstrap/create-state-bucket.sh || true

      - name: Cleanup Existing AWS Resources
        run: bash terraform/bootstrap/cleanup-resources.sh || true

      - name: Initialize Terraform
        working-directory: ./terraform
        run: |
          terraform init -backend-config=state.config

      - name: Plan Terraform
        working-directory: ./terraform
        run: |
          terraform plan \
            -lock=false \
            -input=false \
            -var="domain_name=rafikben.cloud" \
            -var="bucket_name=rafik-portfolio" \
            -var="admin_email=rafik.bennacer.cs@gmail.com" \
            -var="aws_region=us-east-1"

      - name: Apply Terraform
        working-directory: ./terraform
        run: |
          terraform apply \
            -lock=false \
            -auto-approve \
            -input=false \
            -var="domain_name=rafikben.cloud" \
            -var="bucket_name=rafik-portfolio" \
            -var="admin_email=rafik.bennacer.cs@gmail.com" \
            -var="aws_region=us-east-1"
          echo "S3_BUCKET_NAME=$(terraform output -raw s3_bucket_name)" >> $GITHUB_ENV
          echo "CLOUDFRONT_DIST_ID=$(terraform output -raw cloudfront_distribution_id)" >> $GITHUB_ENV

      - name: Upload to S3
        working-directory: ./client
        run: |
          aws s3 sync ./dist s3://${{ env.S3_BUCKET_NAME }} --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DIST_ID }} \
            --paths "/*"
